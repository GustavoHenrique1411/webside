version: '3.8'

services:
  # Frontend
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - webside-network

  # Backend
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=webside
      - JWT_SECRET=your-super-secret-jwt-key
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mysql
    networks:
      - webside-network

  # Database
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=webside
      - MYSQL_USER=webside_user
      - MYSQL_PASSWORD=webside_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_complete.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - webside-network

volumes:
  mysql_data:

networks:
  webside-network:
    driver: bridge
