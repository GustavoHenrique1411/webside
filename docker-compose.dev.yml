services:
  # Database only - for local development
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=webside_db
      - MYSQL_USER=webside_user
      - MYSQL_PASSWORD=webside_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_complete.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - webside-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:

networks:
  webside-network:
    driver: bridge
