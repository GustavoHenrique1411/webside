# Production Docker Compose Override
# This file provides production-specific configuration

version: '3.8'

services:
  # Frontend - Nginx serving React build
  frontend:
    restart: always
    # Remove Adminer in production by not including it
    
  # Backend - Node.js Express API
  backend:
    restart: always
    environment:
      - NODE_ENV=production
      # Use external Hostgator database
      - DB_HOST=${DB_HOST:-162.241.2.103}
      - DB_USER=${DB_USER:-websid23_dev}
      - DB_PASSWORD=${DB_PASSWORD:-Web@132435*}
      - DB_NAME=${DB_NAME:-websid23_erp}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - PORT=3002
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Database - only if using local DB
  db:
    restart: always
    # Production-grade MySQL settings
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

